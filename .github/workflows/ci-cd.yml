name: Calendar Service CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get commit SHA
      id: vars
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build image
      run: docker build -t alinioan/calendar-service:latest .

    - name: Push image
      run: docker push alinioan/calendar-service:latest

    - name: Build tagged image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/calendar-service:${{ steps.vars.outputs.SHA }} .

    - name: Push tagged image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/calendar-service:${{ steps.vars.outputs.SHA }}

